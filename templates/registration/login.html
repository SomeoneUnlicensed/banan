{% extends 'base.html' %}
{% block title %}Вход — Banan{% endblock %}
{% block content %}
<div class="auth-form">
    <h1>🔐 Вход</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Войти</button>
    </form>
    <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
</div>
{% endblock %}
