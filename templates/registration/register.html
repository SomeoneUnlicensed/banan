{% extends 'base.html' %}
{% block title %}Регистрация — Banan{% endblock %}
{% block content %}
<div class="auth-form">
    <h1>📝 Регистрация</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
</div>
{% endblock %}
