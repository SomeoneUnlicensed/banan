{% extends 'base.html' %}
{% block title %}Регистрация — Arlist{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Создать аккаунт</h1>
        <p class="auth-subtitle">Присоединяйтесь к Arlist</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>
        <div class="auth-footer">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </div>
    </div>
</div>
{% endblock %}
